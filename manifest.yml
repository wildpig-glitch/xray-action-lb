modules:
  action:
    - key: get-xray-data
      name: Get Xray Data for a Test Issue
      function: getXrayData
      description: Fetches Xray data for a given test issue with user choice of data type.
      inputs:
        issueId:
          title: Issue Id
          type: string
          description: The issue id for the Jira issue that the Xray data is being retrieved for.
          required: true
        dataType:
          title: Data Type
          type: string
          description: The type of data to retrieve (test-steps, preconditions, test-sets, test-plans, test-runs).
          required: false
      actionVerb: GET
    - key: get-test-steps
      name: Get Test Steps
      function: getTestSteps
      description: Fetches test steps, actions, and expected results for a test issue.
      inputs:
        issueId:
          title: Issue Id
          type: string
          description: The issue id for the Jira test issue.
          required: true
      actionVerb: GET
    - key: get-preconditions
      name: Get Test Preconditions
      function: getPreconditions
      description: Fetches preconditions for a test issue.
      inputs:
        issueId:
          title: Issue Id
          type: string
          description: The issue id for the Jira test issue.
          required: true
      actionVerb: GET
    - key: get-test-sets
      name: Get Test Sets
      function: getTestSets
      description: Fetches test sets containing the specified test issue.
      inputs:
        issueId:
          title: Issue Id
          type: string
          description: The issue id for the Jira test issue.
          required: true
      actionVerb: GET
    - key: get-test-plans
      name: Get Test Plans
      function: getTestPlans
      description: Fetches test plans containing the specified test issue.
      inputs:
        issueId:
          title: Issue Id
          type: string
          description: The issue id for the Jira test issue.
          required: true
      actionVerb: GET
    - key: get-test-runs
      name: Get Test Runs
      function: getTestRuns
      description: Fetches execution history and test runs for a test issue.
      inputs:
        issueId:
          title: Issue Id
          type: string
          description: The issue id for the Jira test issue.
          required: true
      actionVerb: GET
    - key: get-user-story
      name: Get User Story
      function: getUserStory
      description: Finds the user story that a given test is testing by looking for the "tests" link type.
      inputs:
        issueId:
          title: Issue Id
          type: string
          description: The issue id for the Jira test issue.
          required: true
      actionVerb: GET
    - key: get-linked-test-cases
      name: Get Linked Test Cases
      function: getLinkedTestCases
      description: Finds all test cases linked to a user story via 'is tested by' or 'tests' relationships.
      inputs:
        issueId:
          title: Issue Id
          type: string
          description: The issue id for the user story to find linked test cases for.
          required: true
      actionVerb: GET
    - key: get-user-story-details
      name: Get User Story Details
      function: getUserStoryDetails
      description: Fetches a user story's summary, description and acceptance criteria by issue key. Also resolves the story from a Test issue key via the "tests" link.
      inputs:
        issueKey:
          title: Issue Key
          type: string
          description: Jira issue key of the user story (e.g. SDF-22) or test issue (e.g. SDF-28). Test issues are resolved to their linked story automatically.
          required: true
      actionVerb: GET
    - key: create-xray-test
      name: Create Xray Test Case
      function: createXrayTest
      description: Creates a test case in Xray Cloud from LLM-generated content and links it to the originating user story.
      inputs:
        projectKey:
          title: Project Key
          type: string
          description: The Jira project key where the test case should be created (e.g. SDF).
          required: true
        userStoryKey:
          title: User Story Key
          type: string
          description: The issue key of the user story this test validates (e.g. SDF-22).
          required: true
        summary:
          title: Test Summary
          type: string
          description: A concise summary/title for the test case (max 255 characters).
          required: true
        description:
          title: Test Description
          type: string
          description: A plain text description of what this test validates.
          required: false
        testSteps:
          title: Test Steps
          type: string
          description: JSON array of test steps with action, data and result fields. Example:[{"action":"...","data":"...","result":"..."}]
          required: true
        preconditions:
          title: Preconditions
          type: string
          description: JSON array of precondition strings. Example:["User is logged in","Test data is available"]
          required: false
      actionVerb: CREATE
  rovo:agent:
    - key: xray-action-lb
      name: xray-action-lb
      description: A simple agent to demonstrate the use of custom actions.
      prompt: >
        You are a helpful agent that specializes in Xray test management and test case generation.


        You can perform the following jobs:

        a. Get Xray Data for a Test Issue
        b. Generate Test Case for User Story


        I'll separate the instructions for each job with a '---' on a new line,
        followed by the job title.


        ---

        a. Get Xray Data for a Test Issue

        To do this, follow these steps:

        1. If there is not an issue key in the context, ask for one

        2. fetch the Xray specific data using the get-xray-data action

        3. return the retrieved Xray data to the user

        ---

        b. Generate Test Case for User Story

        To generate a comprehensive test case for a user story, follow the instructions
        in the "Generate Test Case" scenario exactly.

      conversationStarters:
        - retrieve Xray data for this test case
        - get test steps for this issue
        - get test runs for this issue
        - generate a test case for this user story
      actions:
        - get-xray-data
        - get-test-steps
        - get-preconditions
        - get-test-sets
        - get-test-plans
        - get-test-runs
        - get-user-story
        - get-linked-test-cases
        - get-user-story-details
        - create-xray-test
  function:
    - key: getXrayData
      handler: index.getXrayData
    - key: getTestSteps
      handler: index.getTestSteps
    - key: getPreconditions
      handler: index.getPreconditions
    - key: getTestSets
      handler: index.getTestSets
    - key: getTestPlans
      handler: index.getTestPlans
    - key: getTestRuns
      handler: index.getTestRuns
    - key: getUserStory
      handler: index.getUserStory
    - key: getLinkedTestCases
      handler: index.getLinkedTestCases
    - key: getUserStoryDetails
      handler: index.getUserStoryDetails
    - key: createXrayTest
      handler: index.createXrayTest
app:
  runtime:
    name: nodejs22.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/4bef5a04-26c3-4fc1-aed2-3ffa188a86af
permissions:
  scopes:
    - write:jira-work
    - read:jira-work
    - read:chat:rovo
  external:
    fetch:
      backend:
      - 'https://xray.cloud.getxray.app'
